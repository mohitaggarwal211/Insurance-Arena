name: Update Financial News

on:
  schedule:
    # Every 6 hours: 01:00, 07:00, 13:00, 19:00 UTC
    # = 6:30 AM, 12:30 PM, 6:30 PM, 12:30 AM IST
    - cron: '0 1,7,13,19 * * *'
  workflow_dispatch:  # Manual "Run workflow" button

permissions:
  contents: write

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch financial news
        id: fetch
        run: node scripts/fetch-news.js
        continue-on-error: true

      - name: Commit updated news
        if: steps.fetch.outcome == 'success'
        run: |
          git config user.name "Arena News Bot"
          git config user.email "actions@github.com"
          git add data/news.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📰 News update: $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi

      - name: Report failure (news kept from previous run)
        if: steps.fetch.outcome == 'failure'
        run: echo "⚠️ Fetch failed or too few articles — previous news.json preserved. No commit made."
