name: Monthly Product Data Review Reminder

# Runs on the 1st of every month at 9:00 AM IST (3:30 AM UTC)
# Opens a GitHub Issue reminding to verify plan versions/UINs against
# official insurer sources — catches silent version bumps like
# Axis Max Online Savings Plan Plus V01 → V02.

on:
  schedule:
    - cron: '30 3 1 * *'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  create-review-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run registry validation
        id: validate
        continue-on-error: true
        run: |
          node scripts/validate-registry.js > validation.txt 2>&1 || true
          echo "REPORT<<EOF" >> $GITHUB_OUTPUT
          cat validation.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create monthly review issue
        uses: actions/github-script@v7
        with:
          script: |
            const month = new Date().toLocaleString('en-IN', { month: 'long', year: 'numeric', timeZone: 'Asia/Kolkata' });
            const report = `${{ steps.validate.outputs.REPORT }}`;
            const body = [
              '## 🗓️ Monthly Product Data Review — ' + month,
              '',
              'This automated reminder covers the monthly re-verification protocol.',
              '',
              '### Checklist',
              '- [ ] **UIN version check** — visit each insurer\'s product page and confirm the UIN version matches our data (silent bumps like V01→V02 happen without announcements)',
              '- [ ] **Term Insurance** — 12 plans (incl. DigiShield, Salaried Term)',
              '- [ ] **ULIP** — 12 plans across 11 companies',
              '- [ ] **Participating / Non-Par / Early Income / Annuity** — spot-check base plans',
              '- [ ] **Product URLs** — click 3-4 random Product/Brochure buttons per category, confirm no 404s',
              '- [ ] **IRDAI new product launches** — check for any newly approved plans worth adding',
              '- [ ] **CSR figures** — update if new IRDAI annual report published',
              '- [ ] Run `node scripts/validate-registry.js` locally after any data change',
              '',
              '### Latest automated registry validation',
              '```',
              report || 'Validation output unavailable — run locally.',
              '```',
              '',
              '_Auto-generated by the monthly review workflow. Close this issue once review is complete._'
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🗓️ Monthly Product Data Review — ' + month,
              body: body,
              labels: ['data-review']
            });
