# ══════════════════════════════════════
# INSURANCE ARENA — NEWS FETCH WORKFLOW
# Runs TWICE daily: 7 AM IST + 4 PM IST
# Accumulates up to 45 articles
# Merges new + existing, deduplicates, caps at 45
# ══════════════════════════════════════

name: Fetch Finance & Insurance News

on:
  schedule:
    - cron: '30 1 * * *'    # 7:00 AM IST  (1:30 AM UTC)
    - cron: '30 10 * * *'   # 4:00 PM IST  (10:30 AM UTC)
  workflow_dispatch:          # Manual trigger from GitHub Actions tab

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run news fetch and accumulate
        run: node scripts/fetch-news.js

      - name: Check if news.json changed
        id: check
        run: |
          if git diff --quiet data/news.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No new articles found"
          else
            COUNT=$(cat data/news.json | python3 -c 'import json,sys; d=json.load(sys.stdin); print(len(d.get("articles",[])))' 2>/dev/null || echo "?")
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "news.json updated — $COUNT articles"
          fi

      - name: Commit and push updated news
        if: steps.check.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "Insurance Arena Bot"
          git add data/news.json
          git commit -m "🤖 News update — $(date '+%d %b %Y, %I:%M %p IST')"
          git push

      - name: Summary
        run: |
          COUNT=$(cat data/news.json | python3 -c 'import json,sys; d=json.load(sys.stdin); print(len(d.get("articles",[])))' 2>/dev/null || echo "?")
          echo "✅ Done — $COUNT articles in news.json"
